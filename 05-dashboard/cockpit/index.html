<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent OS · Cockpit</title>
<style>
:root{
  --bg:#0e1117; --panel:#161b22; --line:#232a34; --ink:#e6edf3; --mut:#8b949e;
  --claude:#a78bfa; --gemini:#60a5fa; --gpt:#34d399; --hermes:#f59e0b;
  --idle:#6b7280; --run:#22c55e; --block:#ef4444; --review:#a855f7; --wait:#f59e0b; --ready:#3b82f6; --done:#22c55e;
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif}
.wrap{max-width:1200px;margin:0 auto;padding:16px}
.hero{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
  background:linear-gradient(135deg,#11151c,#1b2230);border:1px solid var(--line);border-radius:14px;padding:14px 18px}
.hero h1{margin:0;font-size:18px;display:flex;align-items:center;gap:9px}
.live{width:9px;height:9px;border-radius:50%;background:var(--run);box-shadow:0 0 0 0 rgba(34,197,94,.7);animation:p 2s infinite}
@keyframes p{70%{box-shadow:0 0 0 8px rgba(34,197,94,0)}}
.hero .meta{font-size:12px;color:var(--mut);text-align:right}
.pill{padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;background:#1f2630;color:#cbd5e1}
h2{font-size:11px;letter-spacing:1.3px;text-transform:uppercase;color:var(--mut);margin:18px 2px 9px;font-weight:700}
.grid{display:grid;gap:11px}
.agents{grid-template-columns:repeat(auto-fill,minmax(250px,1fr))}
.two{grid-template-columns:1fr 1fr}.tiles{grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
@media(max-width:720px){.two{grid-template-columns:1fr}}
.card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:13px}
.agent{border-top:3px solid var(--line)}
.agent .nm{font-weight:700;font-size:15px;display:flex;align-items:center;gap:8px}
.agent .role{color:var(--mut);font-size:12px;margin:3px 0 9px}
.agent .task{font-size:13px;min-height:18px}
.agent .sub{margin-top:9px;font-size:11px;color:var(--mut);display:flex;flex-direction:column;gap:2px}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none}
.st{margin-left:auto;font-size:10.5px;font-weight:700;text-transform:uppercase;display:flex;gap:5px;align-items:center}
.row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
.row:last-child{border-bottom:0}.row .tid{font-family:ui-monospace,monospace;color:var(--mut);font-size:11px}
.tag{font-size:10px;font-weight:700;padding:1px 6px;border-radius:5px;background:#222b36;color:#9fb0c3}
.empty{color:var(--mut);font-size:12.5px;padding:9px 2px}
.tile .t{font-size:11.5px;color:var(--mut)}.tile .v{font-weight:700;margin-top:4px;display:flex;gap:7px;align-items:center}
/* command bar */
.cmd{position:sticky;bottom:0;margin-top:18px;background:#11161d;border:1px solid var(--line);border-radius:12px;padding:11px;display:flex;gap:8px;flex-wrap:wrap}
.cmd select,.cmd input{background:#0d1117;border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:9px 10px;font-size:13px}
.cmd input{flex:1;min-width:200px}
.cmd button{background:var(--gemini);border:0;color:#06121f;font-weight:700;border-radius:8px;padding:9px 16px;cursor:pointer}
.cmd .hint{flex-basis:100%;color:var(--mut);font-size:11px}
.clog{margin-top:9px;font-size:12px}.clog .l{padding:5px 0;border-bottom:1px solid var(--line);color:var(--mut)}
.banner{background:#2a1416;border:1px solid #5b2326;color:#f3b0b0;border-radius:10px;padding:9px 13px;font-size:13px;margin-top:12px;display:none}
.proj{display:inline-block;margin:0 7px 7px 0;background:#1a212b;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:12px}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div><h1><span class="live"></span> Agent OS · Cockpit</h1>
      <div id="phase" style="color:var(--mut);font-size:12.5px;margin-top:5px">불러오는 중…</div></div>
    <div class="meta"><span id="overall" class="pill">—</span><div id="src" style="margin-top:6px"></div></div>
  </div>
  <div class="banner" id="banner"></div>

  <h2>Agents</h2><div id="agents" class="empty">불러오는 중…</div>

  <div class="two grid" style="margin-top:4px">
    <div><h2>Tasks (substrate)</h2><div class="card" id="tasks"><div class="empty">…</div></div></div>
    <div><h2>System Health</h2><div id="health" class="grid tiles"></div></div>
  </div>

  <h2>Projects</h2><div id="projects" class="card"><div class="empty">…</div></div>

  <h2>Command / 에이전트 소통</h2>
  <div class="cmd">
    <select id="agent"><option>Hermes</option><option>Claude</option><option>Gemini</option><option>Codex</option></select>
    <input id="text" placeholder="명령 입력 — 예: daily-status 루프 돌려 / DFXISP C1 시작" onkeydown="if(event.key==='Enter')send()">
    <button onclick="send()">보내기</button>
    <div class="hint">명령창은 substrate 큐에 task(ready)를 투입합니다 → 담당 에이전트가 claim/handoff. 실시간 LLM 챗봇이 아니라 명령·소통 채널입니다.</div>
    <div class="clog" id="clog" style="flex-basis:100%"></div>
  </div>
  <div style="text-align:center;color:var(--mut);font-size:11px;margin:16px 0 6px" id="foot"></div>
</div>

<script>
const SC={idle:'var(--idle)',running:'var(--run)',blocked:'var(--block)',review:'var(--review)',waiting:'var(--wait)',ready:'var(--ready)',done:'var(--done)',todo:'var(--idle)'};
const AC={Claude:'var(--claude)',Gemini:'var(--gemini)',GPT:'var(--gpt)',Hermes:'var(--hermes)',Codex:'var(--gpt)'};
const esc=s=>(s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const dot=s=>'<span class="dot" style="background:'+(SC[s]||'var(--idle)')+'"></span>';

async function refresh(){
  const b=document.getElementById('banner');
  try{
    const r=await fetch('/api/state'); const j=await r.json(); b.style.display='none'; render(j);
  }catch(e){ b.style.display=''; b.textContent='상태 로드 실패: '+e; }
  try{ const t=await (await fetch('/api/tasks')).json(); renderTasks(t); }catch(e){}
  document.getElementById('foot').textContent='출처: dashboard-state.json + substrate · 15초마다 자동 새로고침';
}

function render(j){
  const d=j.state||{}, m=d._meta||{}, ss=d.system_status||{};
  document.getElementById('phase').textContent=(ss.note||'')+(ss.phase?'  ·  '+ss.phase:'');
  document.getElementById('overall').textContent=(ss.overall||'—').toUpperCase();
  document.getElementById('src').textContent='source: '+(j.source||'?')+' · '+(m.last_updated_at||'');

  const order=['Claude','Gemini','GPT','Hermes'], as=d.agent_status||{};
  const ks=order.filter(k=>as[k]).concat(Object.keys(as).filter(k=>!order.includes(k)));
  document.getElementById('agents').className='grid agents';
  document.getElementById('agents').innerHTML=ks.map(k=>{const a=as[k]||{},ac=AC[k]||'var(--line)',s=a.status||'idle';
    return '<div class="card agent" style="border-top-color:'+ac+'"><div class="nm"><span class="dot" style="background:'+ac+'"></span>'+esc(k)+
      '<span class="st" style="color:'+(SC[s]||'var(--idle)')+'">'+dot(s)+esc(s)+'</span></div>'+
      '<div class="role">'+esc(a.role||'')+'</div>'+
      '<div class="task">'+(a.current_task?esc(a.current_task):'<span style="color:var(--mut)">대기 중</span>')+'</div>'+
      '<div class="sub">'+(a.waiting_for?'<span>⏳ '+esc(a.waiting_for)+'</span>':'')+
        (a.last_output?'<span>↪ '+esc(a.last_output)+'</span>':'')+
        '<span>last · '+esc(a.last_active||'—')+'</span></div></div>';}).join('');

  const h=d.system_health||{}, HC={ok:'var(--run)',fresh:'var(--run)',unknown:'var(--idle)',stale:'var(--wait)',fail:'var(--block)'};
  document.getElementById('health').innerHTML=Object.keys(h).map(k=>{const v=h[k]||{},s=(v.status||'unknown').toLowerCase();
    return '<div class="card tile"><div class="t">'+esc(k)+'</div><div class="v">'+dot(s)+esc(v.status||'unknown')+'</div>'+
      (v.note?'<div style="color:var(--mut);font-size:10.5px;margin-top:3px">'+esc(v.note)+'</div>':'')+'</div>';}).join('')||'<div class="empty">—</div>';

  const pr=d.active_projects||[];
  document.getElementById('projects').innerHTML=pr.length?pr.map(p=>'<span class="proj"><b>'+esc(p.name)+'</b> · '+esc(p.status||'')+'</span>').join(''):'<div class="empty">활성 프로젝트 없음</div>';
}

function renderTasks(t){
  const el=document.getElementById('tasks');
  if(!t.ok){ el.innerHTML='<div class="empty">substrate 미연결 — '+esc((t.error||'').slice(0,90))+'<br>deploy.sh 실행 후 표시됩니다.</div>'; return; }
  const rows=t.tasks||[];
  el.innerHTML=rows.length?rows.slice(0,40).map(x=>'<div class="row">'+dot((x.status||'').toLowerCase())+
    '<span>'+esc(x.title||x.task_id)+'</span><span class="tag">'+esc(x.board)+'</span>'+
    (x.owner_agent?'<span class="tag">'+esc(x.owner_agent)+'</span>':'')+
    '<span class="tid" style="margin-left:auto">'+esc(x.task_id)+'</span></div>').join('')
    :'<div class="empty">큐가 비어 있음</div>';
}

async function send(){
  const agent=document.getElementById('agent').value, t=document.getElementById('text');
  const text=t.value.trim(); if(!text) return; t.value='';
  const log=document.getElementById('clog');
  try{
    const r=await fetch('/api/command',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({agent,text})});
    const j=await r.json();
    log.innerHTML='<div class="l">→ '+esc(agent)+' · '+esc(text)+'  ['+esc(j.task_id||'?')+']'+(j.note?' · '+esc(j.note):'')+'</div>'+log.innerHTML;
  }catch(e){ log.innerHTML='<div class="l">전송 실패: '+esc(e)+'</div>'+log.innerHTML; }
  setTimeout(refresh,600);
}
refresh(); setInterval(refresh,15000);
</script>
</body>
</html>
